<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Application_form.css">
  <title>Student Regestration Form</title>
</head>

<body>
  <form>
    <h1>Registration Form</h1>
    <fieldset>
      <legend>Personal Information</legend>
      <!-- <================UsrName=================> -->
      <div class="row">
        <div class="First_name"> <label for="">First name</label>
          <input class="form_holder" id="First_name" type="text" autocomplete="off" placeholder="First Name ">
          <div class="error" id="Firstname_error"></div>
        </div>
        <div class="Last_Name"><label for="">Last name</label>
          <input class="form_holder" id="Last_Name" type="text" autocomplete="off" placeholder="Last Name">
          <div class="error" id="Lastname_error"></div>
        </div>
      </div>
      <!-- <================Email=================> -->
      <label for="email">Email</label>
      <input class="form_holder" id="email" type="email" placeholder="Enter Your Email" autocomplete="additional-name">
      <div class="error" id="email_error"></div>

      <!-- <================password=================> -->
      <label for="password">Pasword</label>
      <input class="form_holder" id="password" type="Pasword" placeholder="Enter Your Pasword">
      <div class="error" id="passoword_error"></div>
      <!-- <================Confirm Pasword=================> -->
      <label for="password_match">Confirm Pasword</label>
      <input class="form_holder" id="password_match" type="Pasword" placeholder="Confirm Your Pasword">

      <div class="error" id="notmatch_error"></div>

      <!-- <================Phone Number=================> -->
      <label for="phone_number">Phone Number</label>
      <input class="form_holder" id="phone_number" type="number" placeholder="Enter Your Phone Number">
      <div class="error" id="phone_error"></div>

      <!-- <================date of Brith=================> -->
      <label for="date_brith">date of Brith</label>
      <input class="form_holder" id="date_brith" type="date" placeholder="Enter Your Email">
      <div class="error" id="date_error"></div>
      <!-- <================Gender=================> -->

      <label>Gender</label>
      <input class="inline" type="radio" name="gender" value="male"> Male
      <input class="inline" type="radio" name="gender" value="female"> Female
      <input class="inline" type="radio" name="gender" value="other"> Other
      <div class="error" id="gender_error"></div>


    </fieldset>

    <!-- <================Phone Number=================> -->
    <fieldset>
      <legend>Education</legend>
      <label for="select">Highest Qualification</label>
      <select id="select" required>
        <option value="">Select</option>
        <option value="Matric">Matric</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Bachelors">Bachelors</option>
        <option value="Masters">Masters</option>
      </select>
      <div class="error" id="education_error"></div>




      <label for="field">Field of Study</label>
      <select id="field" required>
        <option value="">Select</option>

        <optgroup label="Computer Science">
          <option value="Web">Web Development</option>
          <option value="ai">Ai/Machine Learning</option>
          <option value="Digital">Digital Marketing</option>
        </optgroup>

        <optgroup label="Engineering">
          <option value="mach">Mechanical Engineering</option>
          <option value="elec">Electrical Engineering</option>
          <option value="bio">Bio-Medical Engineering</option>
        </optgroup>
      </select>

      <div class="error" id="study_error"></div>

      <label for="skills">Skills</label>
      <input class="inline form_holder" type="checkbox" name="skills">Web Development
      <input class="inline form_holder" type="checkbox" name="skills">UI/UX Designer
      <input class="inline form_holder" type="checkbox" name="skills">Digital Marketing
      <div class="error" id="skills_error"></div>
    </fieldset>


    <fieldset>
      <legend>Upload & Preferences</legend>
      <input id="file_upload" class="inline form_holder" type="file" name="">
      <div class="error" id="upload_error"></div>
      <label for="">Available Time</label>
      <input id="time" class="inline form_holder" type="time">
      <div class="error" id="time_error"></div>
      <label for="">Experience Level(0-10)</label>
      <input id="range" class="inline form_holder" type="range" min="0" max="20" value="0">
      <div class="error" id="level_error"></div>
    </fieldset>

    <fieldset>
      <legend>Additional Information</legend>
      <label for="textarea">About Yourself</label>
      <textarea placeholder="Write something about yourself" name="" id="textarea"></textarea>
      <div class="error" id="textarea_error"></div>

      <label for=""> <input id="term_and_condition" class="inline form_holder" type="checkbox">
        I agree to terms & conditions</label>
      <div class="error" id="term_error"></div>
    </fieldset>

    <button id="submit" class="submit" type="submit">Submit</button>
    <div class="error" id="sumbit_error"></div>
    <span></span>
    <button id="reset" class="reset" type="reset">reset</button>
    <div class="error" id="reset_error"></div>

  </form>
  <script src="Application Form.js"></script>
</body>

</html>
