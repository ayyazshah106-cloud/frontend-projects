<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Character encoding set kar raha hai -->
  <meta charset="UTF-8">

  <!-- Responsive design ke liye viewport setting -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- External CSS file link -->
  <link rel="stylesheet" href="Todo_list_App.css">

  <!-- Page title -->
  <title>Todo List App</title>
</head>

<body>

  <!-- Main container for Todo App -->
  <div class="main_todo">

    <!-- App heading -->
    <h1>My Todo List</h1>

    <!-- Form for adding new todo items -->
    <form class="form">

      <!-- Input and button wrapper -->
      <div class="input_Button">

        <!-- User input field for todo text -->
        <input type="text" id="input_value" placeholder="Enter your task">

        <!-- Button to add todo item -->
        <button class="btn">Add Todo</button>

      </div>

      <!-- Section where todo list items will be displayed -->
      <section class="Todo_list_elem">
        <!-- Todo items will appear here dynamically via JavaScript -->
      </section>

    </form>

  </div>

  <!-- External JavaScript file link -->
  <script src="Todo_list_App.js"></script>

</body>

</html>
